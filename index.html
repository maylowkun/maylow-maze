<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maylow Maze</title>
  <style>
    body{
      margin:0;
      padding:24px 16px;
      background:#f5f5f3;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
      color:#222;
      text-align:center;
    }

    .maze-wrap{
      max-width:360px;
      margin:0 auto;
    }

    h1{
      margin:0 0 14px;
      font-size:16px;
      font-weight:600;
      letter-spacing:0.08em;
    }

    #maze{
      width:300px;
      height:300px;
      margin:0 auto;
      display:grid;
      grid-template-columns:repeat(30, 10px);
      grid-template-rows:repeat(30, 10px);
      border:1px solid #cfcfcf;
      background:#f7f7f7;
    }

    .cell{
      width:10px;
      height:10px;
      box-sizing:border-box;
      border:1px solid #ececec;
      background:#f7f7f7;
    }

    .wall{
      background:#222;
      border-color:#222;
    }

    .goal{
      background:#bdbdbd;
      border-color:#bdbdbd;
    }

    .player{
      background:#111;
      border-color:#111;
      border-radius:999px;
      transform:scale(0.6);
    }

    .controls{
      margin-top:18px;
    }

    .controls button{
      width:56px;
      height:40px;
      margin:4px;
      border:1px solid #d7d7d7;
      border-radius:999px;
      background:#ececec;
      font-size:20px;
      cursor:pointer;
    }

    .note{
      margin-top:14px;
      font-size:13px;
      color:#555;
    }

    .clear{
      margin-top:14px;
      font-size:14px;
      font-weight:600;
      letter-spacing:0.06em;
      display:none;
    }

    .clear.is-show{
      display:block;
    }
  </style>
</head>
<body>
  <div class="maze-wrap">
    <h1>MAZE GAME</h1>
    <div id="maze"></div>

    <div class="controls">
      <div><button type="button" onclick="move(0,-1)">↑</button></div>
      <div>
        <button type="button" onclick="move(-1,0)">←</button>
        <button type="button" onclick="move(0,1)">↓</button>
        <button type="button" onclick="move(1,0)">→</button>
      </div>
    </div>

    <div class="note">矢印ボタンでゴールまで進む</div>
    <div class="clear" id="clearMessage">CLEAR</div>
  </div>

  <script>
    const mazeEl = document.getElementById('maze');
    const clearMessage = document.getElementById('clearMessage');

    const size = 30;
    const player = { x: 0, y: 0 };
    const goal = { x: 29, y: 29 };

    const map = Array.from({ length: size }, () => Array(size).fill(0));
    const protectedCells = new Set();

    function key(x, y) {
      return x + ',' + y;
    }

    function protect(x, y) {
      if (x >= 0 && y >= 0 && x < size && y < size) {
        protectedCells.add(key(x, y));
      }
    }

    function protectLine(x1, y1, x2, y2) {
      const dx = Math.sign(x2 - x1);
      const dy = Math.sign(y2 - y1);

      let x = x1;
      let y = y1;
      protect(x, y);

      while (x !== x2 || y !== y2) {
        if (x !== x2) x += dx;
        if (y !== y2) y += dy;
        protect(x, y);
      }
    }

    /* スタートからゴールまでの保証ルート */
    const route = [
      [0, 0],
      [0, 7],
      [7, 7],
      [7, 2],
      [14, 2],
      [14, 9],
      [20, 9],
      [20, 3],
      [26, 3],
      [26, 10],
      [29, 10],
      [29, 29]
    ];

    for (let i = 0; i < route.length - 1; i++) {
      protectLine(route[i][0], route[i][1], route[i + 1][0], route[i + 1][1]);
    }

    /* 壁のベースを作る */
    function addBaseWalls() {
      for (let y = 1; y < size - 1; y += 4) {
        const gap1 = (y * 3) % (size - 2) + 1;
        const gap2 = (y * 7) % (size - 2) + 1;
        const gap3 = (y * 11) % (size - 2) + 1;

        for (let x = 0; x < size; x++) {
          if (x === gap1 || x === gap2 || x === gap3) continue;
          if (protectedCells.has(key(x, y))) continue;
          map[y][x] = 1;
        }
      }

      for (let x = 2; x < size - 1; x += 5) {
        const gap1 = (x * 5) % (size - 2) + 1;
        const gap2 = (x * 9) % (size - 2) + 1;
        const gap3 = (x * 13) % (size - 2) + 1;

        for (let y = 0; y < size; y++) {
          if (y === gap1 || y === gap2 || y === gap3) continue;
          if (protectedCells.has(key(x, y))) continue;
          map[y][x] = 1;
        }
      }
    }

    const font = {
      M: [
        "101",
        "111",
        "101",
        "101",
        "101"
      ],
      A: [
        "010",
        "101",
        "111",
        "101",
        "101"
      ],
      Y: [
        "101",
        "101",
        "010",
        "010",
        "010"
      ],
      L: [
        "100",
        "100",
        "100",
        "100",
        "111"
      ],
      O: [
        "111",
        "101",
        "101",
        "101",
        "111"
      ],
      W: [
        "10001",
        "10001",
        "10101",
        "10101",
        "01010"
      ]
    };

    function stampLetter(letter, startX, startY) {
      const pattern = font[letter];
      if (!pattern) return;

      for (let y = 0; y < pattern.length; y++) {
        for (let x = 0; x < pattern[y].length; x++) {
          if (pattern[y][x] !== '1') continue;

          const gx = startX + x;
          const gy = startY + y;

          if (gx < 0 || gy < 0 || gx >= size || gy >= size) continue;
          if (protectedCells.has(key(gx, gy))) continue;

          map[gy][gx] = 1;
        }
      }
    }

    function stampWord() {
      let x = 2;
      const y = 13;

      const letters = ['M', 'A', 'Y', 'L', 'O', 'W'];

      letters.forEach((letter) => {
        stampLetter(letter, x, y);
        x += font[letter][0].length + 1;
      });
    }

    function cleanProtectedRoute() {
      protectedCells.forEach((cell) => {
        const parts = cell.split(',');
        const x = Number(parts[0]);
        const y = Number(parts[1]);
        map[y][x] = 0;
      });

      map[0][0] = 0;
      map[goal.y][goal.x] = 0;
    }

    function buildMaze() {
      addBaseWalls();
      stampWord();
      cleanProtectedRoute();
    }

    function render() {
      mazeEl.innerHTML = '';

      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          const cell = document.createElement('div');
          cell.className = 'cell';

          if (map[y][x] === 1) cell.classList.add('wall');
          if (x === goal.x && y === goal.y) cell.classList.add('goal');
          if (x === player.x && y === player.y) cell.classList.add('player');

          mazeEl.appendChild(cell);
        }
      }
    }

    window.move = function(dx, dy) {
      const nx = player.x + dx;
      const ny = player.y + dy;

      if (nx < 0 || ny < 0 || nx >= size || ny >= size) return;
      if (map[ny][nx] === 1) return;

      player.x = nx;
      player.y = ny;
      render();

      if (player.x === goal.x && player.y === goal.y) {
        clearMessage.classList.add('is-show');
      }
    };

    buildMaze();
    render();
  </script>
</body>
</html>
