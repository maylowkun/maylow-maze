<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maylow Maze</title>
  <style>
    body{
      margin:0;
      padding:24px 16px;
      background:#f5f5f3;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
      color:#222;
      text-align:center;
      overflow:hidden;
    }

    .maze-wrap{
      max-width:360px;
      margin:0 auto;
    }

    h1{
      margin:0 0 14px;
      font-size:16px;
      font-weight:600;
      letter-spacing:0.08em;
    }

    #maze{
      width:300px;
      height:300px;
      margin:0 auto;
      display:grid;
      grid-template-columns:repeat(30, 10px);
      grid-template-rows:repeat(30, 10px);
      border:1px solid #cfcfcf;
      background:#f7f7f7;
    }

    .cell{
      width:10px;
      height:10px;
      box-sizing:border-box;
      border:1px solid #ececec;
      background:#f7f7f7;
    }

    .wall{
      background:#222;
      border-color:#222;
    }

    .goal{
      background:#bdbdbd;
      border-color:#bdbdbd;
    }

    .player{
      background:#111;
      border-color:#111;
      border-radius:999px;
      transform:scale(0.6);
    }

    .controls{
      margin-top:18px;
    }

    .controls button{
      width:56px;
      height:40px;
      margin:4px;
      border:1px solid #d7d7d7;
      border-radius:999px;
      background:#ececec;
      font-size:20px;
      cursor:pointer;
    }

    .note{
      margin-top:14px;
      font-size:13px;
      color:#555;
    }

    .clear{
      margin-top:14px;
      font-size:14px;
      font-weight:600;
      letter-spacing:0.06em;
      display:none;
    }

    .clear.is-show{
      display:block;
    }
  </style>
</head>
<body>
  <div class="maze-wrap">
    <h1>MAZE GAME</h1>
    <div id="maze"></div>

    <div class="controls">
      <div><button type="button" onclick="move(0,-1)">↑</button></div>
      <div>
        <button type="button" onclick="move(-1,0)">←</button>
        <button type="button" onclick="move(0,1)">↓</button>
        <button type="button" onclick="move(1,0)">→</button>
      </div>
    </div>

    <div class="note">矢印ボタンでゴールまで進む</div>
    <div class="clear" id="clearMessage">CLEAR</div>
  </div>

  <script>
    const mazeEl = document.getElementById('maze');
    const clearMessage = document.getElementById('clearMessage');

    const size = 30;
    const player = { x: 0, y: 0 };
    const goal = { x: 29, y: 29 };

    const map = Array.from({ length: size }, () => Array(size).fill(1));

    function key(x, y) {
      return x + ',' + y;
    }

    function inBounds(x, y) {
      return x >= 0 && y >= 0 && x < size && y < size;
    }

    function carveMaze() {
      const stack = [];
      const visited = Array.from({ length: size }, () => Array(size).fill(false));

      function carve(x, y) {
        visited[y][x] = true;
        map[y][x] = 0;
        stack.push([x, y]);

        while (stack.length) {
          const current = stack[stack.length - 1];
          const cx = current[0];
          const cy = current[1];

          const dirs = [
            [0, -2],
            [2, 0],
            [0, 2],
            [-2, 0]
          ].sort(() => Math.random() - 0.5);

          let moved = false;

          for (const [dx, dy] of dirs) {
            const nx = cx + dx;
            const ny = cy + dy;

            if (!inBounds(nx, ny)) continue;
            if (visited[ny][nx]) continue;

            visited[ny][nx] = true;
            map[cy + dy / 2][cx + dx / 2] = 0;
            map[ny][nx] = 0;
            stack.push([nx, ny]);
            moved = true;
            break;
          }

          if (!moved) stack.pop();
        }
      }

      carve(0, 0);
    }

    function openMorePaths() {
      for (let y = 1; y < size - 1; y++) {
        for (let x = 1; x < size - 1; x++) {
          if (map[y][x] === 1 && Math.random() < 0.08) {
            const openAround =
              (map[y - 1][x] === 0 ? 1 : 0) +
              (map[y + 1][x] === 0 ? 1 : 0) +
              (map[y][x - 1] === 0 ? 1 : 0) +
              (map[y][x + 1] === 0 ? 1 : 0);

            if (openAround >= 2) map[y][x] = 0;
          }
        }
      }
    }

    const font = {
      M: [
        "10001",
        "11011",
        "10101",
        "10001",
        "10001"
      ],
      A: [
        "01110",
        "10001",
        "11111",
        "10001",
        "10001"
      ],
      Y: [
        "10001",
        "01010",
        "00100",
        "00100",
        "00100"
      ],
      L: [
        "10000",
        "10000",
        "10000",
        "10000",
        "11111"
      ],
      O: [
        "01110",
        "10001",
        "10001",
        "10001",
        "01110"
      ],
      W: [
        "10001",
        "10001",
        "10101",
        "11011",
        "10001"
      ]
    };

    function stampLetter(letter, startX, startY) {
      const pattern = font[letter];
      if (!pattern) return;

      for (let y = 0; y < pattern.length; y++) {
        for (let x = 0; x < pattern[y].length; x++) {
          if (pattern[y][x] !== '1') continue;
          const gx = startX + x;
          const gy = startY + y;
          if (!inBounds(gx, gy)) continue;
          map[gy][gx] = 1;
        }
      }
    }

    function reserveRoute(points) {
      for (let i = 0; i < points.length - 1; i++) {
        const [x1, y1] = points[i];
        const [x2, y2] = points[i + 1];

        if (x1 === x2) {
          const start = Math.min(y1, y2);
          const end = Math.max(y1, y2);
          for (let y = start; y <= end; y++) map[y][x1] = 0;
        } else if (y1 === y2) {
          const start = Math.min(x1, x2);
          const end = Math.max(x1, x2);
          for (let x = start; x <= end; x++) map[y1][x] = 0;
        }
      }
    }

    function stampWord() {
      const startX = 1;
      const y = 12;
      let x = startX;

      const letters = ['M', 'A', 'Y', 'L', 'O', 'W'];
      for (const letter of letters) {
        stampLetter(letter, x, y);
        x += 6;
      }
    }

    function ensurePlayable() {
      const route = [
        [0, 0],
        [0, 6],
        [5, 6],
        [5, 10],
        [11, 10],
        [11, 18],
        [17, 18],
        [17, 8],
        [23, 8],
        [23, 24],
        [29, 24],
        [29, 29]
      ];
      reserveRoute(route);
      map[0][0] = 0;
      map[29][29] = 0;
    }

    function buildMaze() {
      carveMaze();
      openMorePaths();
      stampWord();
      ensurePlayable();
    }

    function render() {
      mazeEl.innerHTML = '';

      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          const cell = document.createElement('div');
          cell.className = 'cell';

          if (map[y][x] === 1) cell.classList.add('wall');
          if (x === goal.x && y === goal.y) cell.classList.add('goal');
          if (x === player.x && y === player.y) cell.classList.add('player');

          mazeEl.appendChild(cell);
        }
      }
    }

    window.move = function(dx, dy) {
      const nx = player.x + dx;
      const ny = player.y + dy;

      if (!inBounds(nx, ny)) return;
      if (map[ny][nx] === 1) return;

      player.x = nx;
      player.y = ny;
      render();

      if (player.x === goal.x && player.y === goal.y) {
        clearMessage.classList.add('is-show');
      }
    };

    buildMaze();
    render();
  </script>
</body>
</html>
